<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kinetic Ledger | Admin Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-fixed": "#061f1d",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed": "#ffdbd0",
                        "surface": "#f8f9fa",
                        "primary-container": "#006b5f",
                        "tertiary-container": "#8f4c36",
                        "background": "#f8f9fa",
                        "outline-variant": "#bec9c5",
                        "on-tertiary-container": "#ffcebf",
                        "on-primary-fixed-variant": "#005047",
                        "on-surface": "#191c1d",
                        "surface-container": "#edeeef",
                        "secondary-container": "#cae5e0",
                        "on-primary-container": "#95e8d9",
                        "secondary": "#4a635f",
                        "on-tertiary-fixed-variant": "#723521",
                        "tertiary-fixed-dim": "#ffb59e",
                        "primary-fixed": "#9ff2e2",
                        "secondary-fixed": "#cde8e3",
                        "on-secondary-fixed-variant": "#334b48",
                        "surface-dim": "#d9dadb",
                        "inverse-surface": "#2e3132",
                        "surface-tint": "#006b5f",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "tertiary": "#723521",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#390b00",
                        "surface-variant": "#e1e3e4",
                        "on-primary-fixed": "#00201c",
                        "on-primary": "#ffffff",
                        "surface-container-low": "#f3f4f5",
                        "outline": "#6e7976",
                        "secondary-fixed-dim": "#b1ccc7",
                        "inverse-on-surface": "#f0f1f2",
                        "inverse-primary": "#83d5c6",
                        "on-background": "#191c1d",
                        "on-surface-variant": "#3e4946",
                        "surface-container-highest": "#e1e3e4",
                        "on-secondary-container": "#4e6763",
                        "primary-fixed-dim": "#83d5c6",
                        "surface-container-high": "#e7e8e9",
                        "primary": "#005147",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-bright": "#f8f9fa"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.25rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-login-texture {
            background-color: #f8f9fa;
            background-image: radial-gradient(#005147 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.05;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #005147 0%, #006b5f 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface flex items-center justify-center min-h-screen relative overflow-hidden">
<!-- Background Texture Elements -->
<div class="absolute inset-0 bg-login-texture pointer-events-none"></div>
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-fixed/20 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary-fixed/30 blur-[120px] rounded-full"></div>
<main class="relative z-10 w-full max-w-[440px] px-6">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_12px_32px_-4px_rgba(25,28,29,0.08)] overflow-hidden">
<!-- Header Section -->
<div class="pt-12 pb-8 px-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container/10 rounded-xl mb-6">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<h1 class="font-headline font-extrabold text-3xl text-primary tracking-tight mb-2">Kinetic Ledger</h1>
<p class="font-label text-sm text-on-surface-variant uppercase tracking-widest font-semibold">Admin Portal Access</p>
</div>
<!-- Form Section -->
<form class="px-10 pb-12 space-y-6">
<div class="space-y-4">
<!-- Username Field -->
<div class="group">
<label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1" for="username">
                            Username <span class="text-outline/50 font-normal normal-case">(Optional)</span>
</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">person</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 rounded-lg font-body transition-all placeholder:text-outline-variant" id="username" name="username" placeholder="e.g. admin_01" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="block font-label text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2 ml-1" for="password">
                            Password
                        </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-high border-b-2 border-outline-variant/20 focus:border-primary focus:ring-0 rounded-lg font-body transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Action Button -->
<button class="primary-gradient w-full py-4 rounded-lg text-on-primary font-headline font-bold text-lg shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<!-- Auxiliary Links -->
<div class="flex justify-between items-center pt-2">
<a class="text-xs font-semibold text-primary hover:underline decoration-2 underline-offset-4" href="#">Forgot Password?</a>
<a class="text-xs font-semibold text-on-surface-variant hover:text-primary transition-colors" href="#">Request Access</a>
</div>
</form>
</div>
<!-- Offline Status Footer -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-3 px-5 py-2.5 bg-secondary-container/50 backdrop-blur-md rounded-full border border-secondary-fixed-dim/20 shadow-sm">
<span class="flex h-2 w-2 relative">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-secondary"></span>
</span>
<span class="font-label text-xs font-bold text-on-secondary-container tracking-wide uppercase">Offline Mode Active</span>
<div class="h-4 w-px bg-on-secondary-container/20"></div>
<span class="material-symbols-outlined text-sm text-on-secondary-container" data-icon="cloud_off">cloud_off</span>
</div>
<p class="text-[11px] text-outline text-center leading-relaxed max-w-[280px]">
                This terminal is currently operating on local storage. All changes will sync once a secure connection is established.
            </p>
</div>
</main>
<!-- Version & System Info -->
<footer class="fixed bottom-6 left-0 w-full px-10 flex justify-between items-end pointer-events-none">
<div class="font-label text-[10px] text-outline-variant uppercase tracking-[0.2em] font-bold">
            System ID: KL-DX-2024
        </div>
<div class="font-label text-[10px] text-outline-variant uppercase tracking-[0.2em] font-bold">
            v4.2.0-Stable
        </div>
</footer>
</body></html>
